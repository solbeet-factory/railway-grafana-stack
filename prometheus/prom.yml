global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['affectionate-abundance.railway.internal:9187']
    scrape_interval: 15s
    scrape_timeout: 10s
